apiVersion: apps/v1
kind: Deployment
metadata:
  name: ouroboros-server
  namespace: galaxy
spec:
  replicas: 1
  # RWO PVC: only one pod can mount the volume. RollingUpdate would run old+new
  # together and deadlock; Recreate tears down the old pod before starting the new.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      name: ouroboros-server
  template:
    metadata:
      labels:
        name: ouroboros-server
    spec:
      serviceAccountName: ouroboros
      # v3 server runs non-root; SQLite on a PVC from older (root) runs is often
      # root-owned → "attempt to write a readonly database". fsGroup lets the
      # kubelet align volume permissions with the container user (typically 1000).
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
      containers:
        - name: server
          # v3+ has no `latest` tag — use semver; keep agent image in sync
          image: woodpeckerci/woodpecker-server:v3.13.0
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: ouroboros-config
            - secretRef:
                name: ouroboros-env-secrets
          volumeMounts:
            - name: server-data
              mountPath: /var/lib/woodpecker
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: server-data
          persistentVolumeClaim:
            claimName: ouroboros-server-pvc
